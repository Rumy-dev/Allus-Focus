name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Se esses secrets estiverem vazios/com nome errado, o build sobe um
      # app quebrado sem avisar — o Vite não falha, só embute "undefined"
      # e o erro só aparece em runtime pro usuário final. Falha cedo aqui.
      - name: Verify Supabase secrets are set
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::VITE_SUPABASE_URL/VITE_SUPABASE_ANON_KEY ausentes nos secrets do repositório."
            exit 1
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Publica direto no GitHub Releases (PublisherGithub em forge.config.ts)
      # em vez de só empacotar — assim toda tag v* vira a "Latest release" de
      # verdade, que é o que o auto-updater (update-electron-app) checa nos
      # apps já instalados. `make` sozinho só gerava um artifact do Actions,
      # que não é visto pelo auto-updater e precisava ser baixado/enviado à mão.
      - name: Build and publish .dmg
        # hdiutil detach falha de forma intermitente em runners macOS do
        # GitHub Actions (bug conhecido do electron-installer-dmg em CI) —
        # tenta de novo antes de desistir.
        run: npm run publish || npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload .dmg artifact
        # Mantido como backup/diagnóstico mesmo já publicando a release.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allus-focus-mac
          path: out/make/**/*.dmg
          retention-days: 30
