name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build .dmg
        # hdiutil detach falha de forma intermitente em runners macOS do
        # GitHub Actions (bug conhecido do electron-installer-dmg em CI) —
        # tenta de novo antes de desistir.
        run: npm run make || npm run make

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: allus-focus-mac
          path: out/make/**/*.dmg
          retention-days: 30
