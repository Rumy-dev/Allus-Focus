name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Publica direto no GitHub Releases (PublisherGithub em forge.config.ts),
      # completando a mesma release que o build-mac.yml já publica com o
      # .dmg — assim o auto-updater (update-electron-app) enxerga os dois
      # instaladores (Squirrel .exe/.nupkg e .dmg) na mesma "Latest release".
      - name: Build and publish installer
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allus-focus-windows
          path: out/make/**/*
          retention-days: 30
