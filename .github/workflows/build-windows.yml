name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Se esses secrets estiverem vazios/com nome errado, o build sobe um
      # app quebrado sem avisar — o Vite não falha, só embute "undefined"
      # e o erro só aparece em runtime pro usuário final. Falha cedo aqui.
      - name: Verify Supabase secrets are set
        shell: pwsh
        run: |
          if (-not $env:VITE_SUPABASE_URL -or -not $env:VITE_SUPABASE_ANON_KEY) {
            Write-Error "VITE_SUPABASE_URL/VITE_SUPABASE_ANON_KEY ausentes nos secrets do repositório."
            exit 1
          }
          if ($env:VITE_SUPABASE_URL -notmatch '^https?://') {
            Write-Error "VITE_SUPABASE_URL não parece uma URL válida (precisa começar com http:// ou https://). Confira aspas/espaços extras no secret."
            exit 1
          }
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Publica direto no GitHub Releases (PublisherGithub em forge.config.ts),
      # completando a mesma release que o build-mac.yml já publica com o
      # .dmg — assim o auto-updater (update-electron-app) enxerga os dois
      # instaladores (Squirrel .exe/.nupkg e .dmg) na mesma "Latest release".
      - name: Build and publish installer
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allus-focus-windows
          path: out/make/**/*
          retention-days: 30
